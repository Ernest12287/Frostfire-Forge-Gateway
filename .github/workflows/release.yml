name: Gateway > Release

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - development
  workflow_dispatch:

concurrency:
  group: 'gateway-release'
  cancel-in-progress: true

jobs:
  publish-docker:
    name: Build and Publish Docker Image
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create environment file
        run: |
          if [ -d ".env.development" ]; then
            echo ".env.development is a directory. Removing it."
            rm -rf .env.development
          fi

          if [ -f ".env.development" ]; then
            echo ".env.development file exists. Removing it."
            rm .env.development
          fi

          echo 'DATABASE_ENGINE=mysql' >> .env.development
          echo 'DATABASE_HOST="${{ secrets.DATABASE_HOST }}"' >> .env.development
          echo 'DATABASE_NAME="${{ secrets.DATABASE_NAME }}"' >> .env.development
          echo 'DATABASE_PASSWORD="${{ secrets.DATABASE_PASSWORD }}"' >> .env.development
          echo 'DATABASE_USER="${{ secrets.DATABASE_USER }}"' >> .env.development
          echo 'DATABASE_PORT="${{ secrets.DATABASE_PORT }}"' >> .env.development
          echo 'SQL_SSL_MODE=DISABLED' >> .env.development
          echo 'EMAIL_PASSWORD="${{ secrets.EMAIL_PASSWORD }}"' >> .env.development
          echo 'EMAIL_SERVICE="${{ secrets.EMAIL_SERVICE }}"' >> .env.development
          echo 'EMAIL_USER="${{ secrets.EMAIL_USER }}"' >> .env.development
          echo 'EMAIL_TEST="${{ secrets.EMAIL_TEST }}"' >> .env.development
          echo 'WEBSRV_PORT=80' >> .env.development
          echo 'WEBSRV_USESSL=false' >> .env.development
          echo 'WEBSRV_PORTSSL=443' >> .env.development
          echo 'DOMAIN="${{ secrets.DOMAIN }}"' >> .env.development
          echo 'GATEWAY_PORT=9999' >> .env.development
          echo 'GATEWAY_PORTSSL=9443' >> .env.development
          echo 'GATEWAY_USESSL=false' >> .env.development
          echo 'GATEWAY_AUTH_KEY="${{ secrets.GATEWAY_AUTH_KEY }}"' >> .env.development
          echo 'GATEWAY_GAME_SERVER_SECRET="${{ secrets.GATEWAY_GAME_SERVER_SECRET }}"' >> .env.development
          echo 'HEARTBEAT_INTERVAL=30000' >> .env.development
          echo 'SERVER_TIMEOUT=90000' >> .env.development
          echo 'SESSION_TIMEOUT=1800000' >> .env.development
          echo 'GATEWAY_ENABLED=true' >> .env.development
          echo 'GATEWAY_URL="${{ secrets.GATEWAY_URL }}"' >> .env.development
          echo 'VERSION="dev"' >> .env.development
          echo 'GAME_NAME="Frostfire Forge - Development"' >> .env.development
          echo 'LOG_LEVEL=debug' >> .env.development
          echo 'CACHE="memory"' >> .env.development

      - name: Create certificate directories
        run: |
          mkdir -p src/certs/gateway
          mkdir -p src/certs/webserver

      - name: Create Gateway Certificate Chain
        working-directory: src/certs/gateway
        run: |
          # Create CA Bundle using GATEWAY_CERT_CA_BUNDLE secret
          echo "${{ secrets.GATEWAY_CERT_CA_BUNDLE }}" > cert.ca-bundle

          # Create pem
          echo "${{ secrets.GATEWAY_CERT_PEM }}" > cert.pem

          # Create private key
          echo "${{ secrets.GATEWAY_CERT_PRIVATE_KEY }}" > key.pem

      - name: Create Web Server Certificate Chain
        working-directory: src/certs/webserver
        run: |
          # Create CA Bundle using WEBSERVER_CERT_CA_BUNDLE secret
          echo "${{ secrets.WEBSERVER_CERT_CA_BUNDLE }}" > cert.ca-bundle

          # Create pem
          echo "${{ secrets.WEBSERVER_CERT_PEM }}" > cert.pem

          # Create private key
          echo "${{ secrets.WEBSERVER_CERT_PRIVATE_KEY }}" > key.pem

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest

      - name: Determine Dockerfile
        id: dockerfile
        run: |
          if [ "${{ github.ref }}" = "refs/heads/development" ]; then
            echo "dockerfile=./src/docker/Dockerfile.dev" >> $GITHUB_OUTPUT
            echo "target=development" >> $GITHUB_OUTPUT
          else
            echo "dockerfile=./src/docker/Dockerfile.prod" >> $GITHUB_OUTPUT
            echo "target=production" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          target: ${{ steps.dockerfile.outputs.target }}
          push: false
          load: true
          tags: ghcr.io/${{ github.repository }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Start and Test Docker Container
        run: |
          docker run -d --name gateway-test --env-file=.env.development -p 9999:9999 -p 80:80 ghcr.io/${{ github.repository }}:latest
          sleep 5
          if ! docker ps | grep -q gateway-test; then
            echo "Container failed to start!"
            docker logs gateway-test
            exit 1
          fi
          echo "Container started successfully"

      - name: Stop Test Container
        if: always()
        run: |
          docker stop gateway-test || true
          docker rm gateway-test || true

      - name: Push Docker Image to GitHub Packages
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.dockerfile.outputs.dockerfile }}
          target: ${{ steps.dockerfile.outputs.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
